<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billing System</title>
</head>
<body>
    <h1>Add New Product</h1>
    <form method="POST" action="/new_product">
        <label for="product_name">Product Name:</label>
        <input type="text" id="product_name" name="product_name" required>
        <br>
        <label for="product_id">Product ID:</label>
        <input type="text" id="product_id" name="product_id" required>
        <br>
        <label for="product_selling_amount">Selling Amount:</label>
        <input type="number" id="product_selling_amount" name="product_selling_amount" required>
        <br>
        <label for="product_raw_amount">Raw Amount:</label>
        <input type="number" id="product_raw_amount" name="product_raw_amount" required>
        <br>
        <label for="product_percentage">Percentage:</label>
        <input type="number" id="product_percentage" name="product_percentage" step="0.01" required>
        <br>
        <label for="discount">Discount:</label>
        <input type="number" id="discount" name="discount" step="0.01" required>
        <br>
        <label for="status">Status:</label>
        <select id="status" name="status">
            <option value="">Select Status</option>
            <option value="active">Active</option>
            <option value="inactive">Inactive</option>
        </select>
        <br>
        <label for="product_location">Product Location:</label>
        <input type="text" id="product_location" name="product_location">
        <br><button type="submit">Add Product</button>

    </form>

</body>
</html>
