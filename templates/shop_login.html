<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billing System</title>
</head>
<body>
    <h1>Shop Login</h1>
    <form method="POST" action="/shop_login">
        <label for="shop_username">Shop Username:</label>
        <input type="text" id="shop_username" name="shop_username" required>
        <br>
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required>
        <br>
        <button type="submit">Login</button>
    </form>
</body>
</html>
